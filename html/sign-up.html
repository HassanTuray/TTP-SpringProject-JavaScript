<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Sign Up</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header>
        <div class="header-container">
            <a href="/html/home.html" class="header-logo">
                <img src="/bes-black.png" alt="Logo" width="120" height="90">
            </a>
            <div class="header-middle"></div>
            <div class="header-user-section">
                <button id="user-menu-button" class="header-user-button" aria-label="User account menu">
                    👤
                </button>
                <div id="user-dropdown" class="header-dropdown" style="display: none;">
                    <!-- Data inserted by JavaScript -->
                </div>
            </div>
        </div>
    </header>

<main class="form-page">
  <section class="form-container">
    <h1 class="form-title">Sign Up</h1>

    <div id="errorBox" class="form-error" style="margin-bottom:1rem; display:none;"></div>

    <div class="form-group">
      <label for="username" class="form-label">Username</label>
      <input
        id="username"
        type="text"
        class="form-input"
        placeholder="Enter your username"
      />
    </div>

    <div class="form-group">
      <label for="email" class="form-label">Email</label>
      <input
        id="email"
        type="text"
        class="form-input"
        placeholder="Enter your email"
      />
      <div id="emailError" class="form-error" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label for="password" class="form-label">Password</label>
      <input
        id="password"
        type="password"
        class="form-input"
        placeholder="Enter your password (min 6 characters)"
      />
      <div id="passwordError" class="form-error" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label for="year" class="form-label">Year</label>
      <select id="year" class="form-select">
        <option value="">Select your year</option>
        <option value="freshman">Freshman</option>
        <option value="sophomore">Sophomore</option>
        <option value="junior">Junior</option>
        <option value="senior">Senior</option>
      </select>
    </div>

    <div class="form-group">
      <label for="major" class="form-label">Major</label>
      <select id="major" class="form-select">
        <option value="">Select your major</option>
        <option value="computer-science">Computer Science</option>
        <option value="electrical-engineering">Electrical Engineering</option>
        <option value="computer-engineering">Computer Engineering</option>
        <option value="information-science">Information Science</option>
        <option value="math">Math</option>
        <option value="mechanical-engineering">Mechanical Engineering</option>
        <option value="civil-engineering">Civil Engineering</option>
        <option value="fire-protection-engineering">Fire Protection Engineering</option>
        <option value="aerospace-engineering">Aerospace Engineering</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="mainClub" class="form-label">Main Club</label>
      <select id="mainClub" class="form-select">
        <option value="">Select your main club</option>
        <option value="codeblack">CodeBlack</option>
        <option value="colorstack">ColorStack</option>
        <option value="black-engineers-society">Black Engineers Society</option>
      </select>
    </div>

    <button id="signUpBtn" class="form-button">
      Sign Up
    </button>

    <div class="form-footer">
      Already have an account?
      <a href="/html/sign-in.html" class="form-footer-link">
        Sign In
      </a>
    </div>
  </section>
</main>

<!-- TODO -->
<!-- Add script tags for data.js, user.js, and sign-up.js -->

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>View Profile</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header>
        <div class="header-container">
            <a href="/html/home.html" class="header-logo">
                <img src="/bes-black.png" alt="Logo" width="120" height="90">
            </a>
            <div class="header-middle"></div>
            <div class="header-user-section">
                <button id="user-menu-button" class="header-user-button" aria-label="User account menu">
                    👤
                </button>
                <div id="user-dropdown" class="header-dropdown" style="display: none;">
                    <!-- Data inserted by JavaScript -->
                </div>
            </div>
        </div>
    </header>

<main class="profile-page">
  <div class="profile-container">
    <div class="profile-header">
      <h1 id="profileTitle" class="profile-title">User Profile</h1>
      <button id="editProfileBtn" class="profile-edit-button">
        Edit Profile
      </button>
    </div>

    <div class="profile-info-grid">
      <div class="profile-info-item">
        <div class="profile-info-label">Username</div>
        <div id="usernameValue" class="profile-info-value">User</div>
      </div>

      <div class="profile-info-item">
        <div class="profile-info-label">Year</div>
        <div id="yearValue" class="profile-info-value">Year</div>
      </div>

      <div class="profile-info-item">
        <div class="profile-info-label">Major</div>
        <div id="majorValue" class="profile-info-value">Major</div>
      </div>

      <div class="profile-info-item">
        <div class="profile-info-label">Main Club</div>
        <div id="clubValue" class="profile-info-value">Club</div>
      </div>

      <div class="profile-info-item">
        <div class="profile-info-label">Events Attended</div>
        <div id="eventsValue" class="profile-info-value">0</div>
      </div>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal-dialog">

      <div class="modal-header">
        <h2 class="modal-title">Edit Profile</h2>
      </div>

      <div class="form-group">
        <label for="edit-username" class="form-label">Username</label>
        <input
          id="edit-username"
          type="text"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="edit-year" class="form-label">Year</label>
        <select id="edit-year" class="form-select">
          <option value="freshman">Freshman</option>
          <option value="sophomore">Sophomore</option>
          <option value="junior">Junior</option>
          <option value="senior">Senior</option>
        </select>
      </div>

      <div class="form-group">
        <label for="edit-major" class="form-label">Major</label>
        <select id="edit-major" class="form-select">
          <option value="Computer Science">Computer Science</option>
          <option value="Electrical Engineering">Electrical Engineering</option>
          <option value="Computer Engineering">Computer Engineering</option>
          <option value="Information Science">Information Science</option>
          <option value="Math">Math</option>
          <option value="Mechanical Engineering">Mechanical Engineering</option>
          <option value="Civil Engineering">Civil Engineering</option>
          <option value="Fire Protection Engineering">Fire Protection Engineering</option>
          <option value="Aerospace Engineering">Aerospace Engineering</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="edit-club" class="form-label">Main Club</label>
        <select id="edit-club" class="form-select">
          <option value="codeblack">CodeBlack</option>
          <option value="colorstack">ColorStack</option>
          <option value="black-engineers-society">Black Engineers Society</option>
        </select>
      </div>

      <div class="modal-footer">
        <button id="saveProfileBtn" class="modal-button-primary">Save</button>
        <button id="cancelProfileBtn" class="modal-button-secondary">Cancel</button>
      </div>

    </div>
  </div>

</main>

<script src="/js/data.js"></script>
<script src="/js/view-profile.js"></script>
<script src="/js/user.js"></script>

</body>
</html>

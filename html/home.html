<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/html/home.html" class="header-logo">
                <img src="/bes-black.png" alt="Logo" width="120" height="90">
            </a>
            <div class="header-middle"></div>
            <div class="header-user-section">
                <button id="user-menu-button" class="header-user-button" aria-label="User account menu">
                    👤
                </button>
                <div id="user-dropdown" class="header-dropdown" style="display: none;">
                    <!-- Data inserted by JavaScript -->
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="leaderboard-wrapper">
            <div class="leaderboard-container">
                <h1>Attendance Leaderboard</h1>
                
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Year</th>
                            <th>Major</th>
                            <th>Main Club</th>
                            <th>Events Attended</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Data inserted by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- TODO -->
    <!-- Add script tags to link data.js, formatters.js, home.js, and users.js to this doc  -->
   
</body>
</html>
